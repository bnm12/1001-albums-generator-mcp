name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Install lint dependencies
        run: npm install --no-save --no-package-lock eslint @eslint/js typescript-eslint

      - name: Lint
        run: npx eslint .

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
