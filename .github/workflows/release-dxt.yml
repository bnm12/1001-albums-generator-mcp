name: Release DXT Extensions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Install DXT CLI
        run: npm install -g @anthropic-ai/dxt

      - name: Pack Local Extension
        run: dxt pack . 1001-albums-generator-mcp.dxt

      - name: Pack Remote Extension
        run: |
          mv manifest.json manifest-local-temp.json
          mv manifest-remote.json manifest.json
          dxt pack . 1001-albums-generator-mcp-remote.dxt
          mv manifest.json manifest-remote.json
          mv manifest-local-temp.json manifest.json

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            1001-albums-generator-mcp.dxt
            1001-albums-generator-mcp-remote.dxt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: dxt-extensions
          path: |
            1001-albums-generator-mcp.dxt
            1001-albums-generator-mcp-remote.dxt
